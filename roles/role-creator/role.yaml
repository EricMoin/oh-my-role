name: Role Creator
description: "Creates, verifies, and iterates on rolebox roles. Triggers: create a role, scaffold, add a subagent/skill/function, verify/benchmark a role, fix a broken role."
version: "0.1.0"
mode: primary
prompt_file: PROMPT.md

functions:
  - scaffold
  - verify
  - iterate

skills:
  - role-creator-conventions
  - role-creator-schema
  - role-creator-verification

permission:
  allow:
    - Read
    - Grep
    - Glob
    - Bash
    - Edit
    - Write
    - Dispatch
    - dispatch_output
    - dispatch_cancel

subagents:
  - name: Generator
    description: "Role authoring specialist: given intent + template, generates role artifact files"
  - name: Validator
    description: "Read-only verification specialist: runs Tier 1-3 checks and returns structured reports"
  - name: Grader
    description: "Generic transcript judge: scores expectations 0-10, picks winner in A/B comparisons"
