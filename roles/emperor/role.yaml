name: Emperor
description: "Top-level orchestrator — triage, dispatch, synthesize. Never writes code."
version: "2.2.1"
model: provider/tier-1-flagship
color: "#1a1a2e"
mode: primary
# Low temperature: routing/classification and dispatch decisions should be deterministic
temperature: 0.1
prompt_file: PROMPT.md

# Functions: replaces default plan+execute with high-level orchestration modes
functions:
  - triage
  - synthesize
  - effort
  - loop

auto_activate: [triage, synthesize]

# Skills: loaded on-demand for delegation strategy and failure recovery
skills:
  - delegation-heuristics
  - escalate-recovery

# Reference documents for dispatch decisions, schemas, terminology, model pools, and departments
references:
  schemas:
    path: references/schemas.md
    description: Schema definitions for dispatch payloads, strategy documents, and validation results
  terminology-and-style:
    path: references/terminology-and-style.md
    description: Terminology conventions and English style guide for all emperor-facing output
  model-pool-and-budget:
    path: references/model-pool-and-budget.md
    description: Model pool configuration — three independent pools (tier-1-flagship, tier-2-reasoning, tier-3-fast) each with 5-slot semaphore, and budget allocation rules
  departments:
    path: references/departments.md
    description: Department definitions and domain assignments for dispatch routing

# Subagent orchestration pipeline — flow defines the dispatch edges.
# max_iterations bounds the closed-loop validate/revise cycle (see synthesize.md caps).
collaboration:
  max_iterations: 3
  flow:
    - "parent -> chancellor: strategic planning"
    - "parent -> jinyiwei: direct execution"
    - "chancellor -> parent: strategy document"
    - "jinyiwei -> parent: execution result"
    - "parent -> validator: closed-loop validation"
    - "validator -> parent: validation result"
    - "parent -> jinyiwei: re-dispatch failed subtasks"

# Emperor never writes code directly — delegates all implementation to subagents
tools:
  Write: false
  Edit: false
  Bash: false

permission:
  allow:
    - Read
    - Grep
    - Glob
    - WebFetch
    - websearch_web_search_exa
    - context7_resolve-library-id
    - context7_query-docs
    - dispatch
    - dispatch_output
    - dispatch_cancel

# Dispatch configuration for subagent orchestration
dispatch:
  maxActivePerParent: 2
  maxConcurrent: 5  # Shared across 3 model pools: chancellor sync slot + background sub-agents + jinyiwei margin
  syncPromptTimeoutMs: 600000  # Covers full nested loop across all 3 model pools
  backgroundStaleTimeoutMs: 300000
  maxTotalSessionsPerRequest: 8
  # Counted by direct parent session, not cumulative tree total. The emperor's own session is free (not a spawn).
