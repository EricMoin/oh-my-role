name: oh-my-role
description: Default rolebox registry — community AI agent roles for opencode
url: https://github.com/EricMoin/oh-my-role
roles:
  software-architecture:
    version: "2.2.0"
    description: Software architecture orchestrator — coordinates specialist
      subagents for design, review, ADRs, migration plans, and
      architecture-shaping implementation
    tags: [architecture, design, planning, adr, migration, subagents]
  react-frontend:
    version: "1.0.0"
    description: React/Next.js frontend developer — builds UIs with TypeScript
      and Tailwind
    tags: [react, frontend, typescript, tailwindcss]
  ai-designer:
    version: "3.0.0"
    description: AI Design Director — tiered-routing design director with
      artifact-first output and severity-layered quality gates
    tags: [design, ux, research, prototyping, subagents]
  oss-finder:
    version: "1.2.0"
    description: OSS research and adoption advisor — discovers, source-traces,
      audits, compares, and recommends open-source implementations
    tags: [oss, research, github, architecture, adoption]
  supersearch:
    version: "1.1.0"
    description: Aggressive evidence-backed search agent — searches local files,
      code, web, GitHub, official docs, sessions, and visual/document sources
    tags: [search, research, web, github, docs, evidence]
  tauri:
    version: "1.0.0"
    description: Tauri desktop app developer — builds cross-platform apps with
      Rust and web tech
    tags: [tauri, rust, desktop, cross-platform]
  dart-flutter:
    version: "3.0.0"
    description: Dart/Flutter engineering lead with evidence-first research,
      engineering state machines, and specialist gate reviews — builds, tests,
      profiles, and ships cross-platform Flutter and Dart applications
    tags: [dart, flutter, mobile, cross-platform, testing, performance, research]
  jetpack-compose:
    version: "3.0.0"
    description: Jetpack Compose Engineering Lead with evidence-first research,
      engineering state machines, specialist gate reviews, and AOSP/AndroidX
      source tracing — builds, tests, profiles, and ships Android applications
    tags: [android, kotlin, jetpack-compose, compose, mobile, research, source-tracing]
  emperor:
    version: "2.5.0"
    description:
      "Top-level orchestrator — classifies user requests, dispatches to
      planner/executor subtrees, synthesizes results with closed-loop validation"
    tags: [orchestrator, triage, dispatch, planner, executor, subagents]
  role-creator:
    version: "0.2.0"
    description: Meta-role that interviews the user, generates a new rolebox
      role (3 templates), and verifies it with a 4-tier mechanism (structural →
      resolution-sim → deploy-health → behavioral eval)
    tags: [meta, role-creation, verification, scaffolding]
  rolebox-tester:
    version: "3.0.0"
    description: Comprehensive functional tester for rolebox features.
      Executes a full test suite covering skills, dispatch, functions,
      references, tools, permissions, MCP, collaboration graph, hashline
      edit, LSP, sessions, memory tools, search tools, hot reload, signal
      architecture, nested dispatch, and test report artifact generation.
    tags: [testing, qa, dispatch, hashline, lsp, sessions, memory, permissions, collaboration, signal]
  git-master:
    version: "1.0.0"
    description: Expert Git version control operations specialist — covers working
      tree, commits, branches, merging, rebasing, stash, tags, history, undo,
      cherry-pick, remotes, submodules, worktrees, and conflict resolution
    tags: [git, version-control, vcs, branches, merging, rebasing, stash]
