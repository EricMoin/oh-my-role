name: oh-my-role
description: Default rolebox registry — community AI agent roles for opencode
url: https://github.com/EricMoin/oh-my-role
roles:
  software-architect:
    version: "1.0.0"
    description: Professional software architect — designs systems, evaluates trade-offs, writes ADRs
    tags: [architecture, design, planning, patterns]
  react-frontend:
    version: "1.0.0"
    description: React/Next.js frontend developer — builds UIs with TypeScript and Tailwind
    tags: [react, frontend, typescript, tailwindcss]
  ai-designer:
    version: "2.0.1"
    description: AI Design Director — coordinates specialist subagents through UX, visual, interaction, artifact, and review gates
    tags: [design, ux, research, prototyping, subagents]
  oss-finder:
    version: "1.0.1"
    description: OSS research and adoption advisor — discovers, source-traces, audits, compares, and recommends open-source implementations
    tags: [oss, research, github, architecture, adoption]
  tauri:
    version: "1.0.0"
    description: Tauri desktop app developer — builds cross-platform apps with Rust and web tech
    tags: [tauri, rust, desktop, cross-platform]
  dart-flutter:
    version: "2.0.1"
    description: Dart/Flutter engineering lead — builds, reviews, tests, profiles, and ships cross-platform apps
    tags: [dart, flutter, mobile, cross-platform, testing, performance]
  jetpack-compose:
    version: "1.0.0"
    description: Expert Jetpack Compose and Android engineer — builds modern Android apps with Kotlin, Compose, architecture, testing, performance, and source-level platform understanding
    tags: [android, kotlin, jetpack-compose, compose, mobile]
